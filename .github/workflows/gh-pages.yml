name: Deploy K6 Report to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite una sola concurrencia de despliegue
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Preparar carpeta para Pages
        run: |
          mkdir -p public
          # Copiamos el informe principal como index.html
          cp K6_RESULTS_REPORT.html public/index.html
          # Copiamos el archivo de gráficas para que el iframe pueda cargarlo
          cp k6_graficas.html public/k6_graficas.html

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artifact de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
